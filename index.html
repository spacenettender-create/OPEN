<!DOCTYPE html>
<html>
<head>
    <title>Will You Be My Valentine?</title>
    <style>
        body { text-align: center; font-family: Arial; background-color: #ffccdc; margin-top: 100px; }
        .container { position: relative; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; border-radius: 10px; border: none; }
        #yesBtn { background-color: #ff4d6d; color: white; }
        #noBtn { background-color: #333; color: white; position: absolute; }
    </style>
</head>
<body>

    <h1>Anjali ❤️ <br> Will you be my Valentine?</h1>
    
    <div class="container">
        <button id="yesBtn" onclick="alert('YAYYY! I love you so much ❤️')">Yes</button>
        <button id="noBtn" onmouseover="moveButton()">No</button>
    </div>

    <script>
        function moveButton() {
            var x = Math.random() * (window.innerWidth - 100);
            var y = Math.random() * (window.innerHeight - 100);
            var noBtn = document.getElementById('noBtn');
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }
    </script>

</body>
</html>
